<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Required for full-screen and safe-area support -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

    <!-- Required for Android/Samsung to stop forcing dark mode -->
    <meta name="theme-color" content="#000000">

    <title>Chargers RC Driver Portal</title>

    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Load Poppins font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Load the root manifest only -->
    <link rel="manifest" href="/manifest.json">
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <!-- Register the service worker (required for install prompt) -->
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/sw.js");
      }
    </script>
  </body>
</html>
